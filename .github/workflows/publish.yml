name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: npm dist-tag to publish under
        required: true
        default: latest

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Build library
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Publish package
        run: npm publish ./dist/angular-django2 --access public --tag "${{ inputs.npm-tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
