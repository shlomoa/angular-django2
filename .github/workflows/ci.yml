name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm run test:ci

      # E2E tests are skipped in CI by default due to long execution time (5+ minutes)
      # To enable, uncomment the following step or run manually with: npm run test:e2e
      # - name: Run E2E tests
      #   run: npm run test:e2e

      - name: Rebuild for pack verification
        run: npm run build

      - name: Verify npm package tarball
        run: npm pack ./dist/angular-django2 --dry-run
