site_name: angular-django2
site_description: Angular library for Django-friendly HTTP integration primitives and custom schematics
site_url: https://angular-django2.readthedocs.io/
repo_url: https://github.com/shlomoa/angular-django2
repo_name: shlomoa/angular-django2
edit_uri: edit/main/docs/

docs_dir: docs

exclude_docs: |
  REQUIREMENTS.md
  INTEGRATION_TESTING.md

nav:
  - Home: index.md
  - Tutorial: TUTORIAL.md
  - CLI: CLI.md

theme:
  name: material
  palette:
    scheme: default
    primary: deep purple
    accent: indigo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
