site_name: angular-django2
site_description: Angular CLI schematics collection for Django-friendly Angular workspaces
site_url: https://angular-django2.readthedocs.io/
repo_url: https://github.com/shlomoa/angular-django2
repo_name: shlomoa/angular-django2
edit_uri: edit/main/docs/

docs_dir: docs

exclude_docs: |
  REQUIREMENTS.md
  INTEGRATION_TESTING.md

nav:
  - Home: index.md
  - Tutorial: TUTORIAL.md
  - CLI:
      - Overview: cli/index.md
      - ng-add: cli/ng-add.md
      - application: cli/application.md
      - ng-app: cli/ng-app.md
      - ng-workspace: cli/ng-workspace.md
      - material-setup: cli/material-setup.md
      - project-structure: cli/project-structure.md
      - app-shell: cli/app-shell.md
      - component: cli/component.md
      - embed-component: cli/embed-component.md
      - service: cli/service.md
      - class: cli/class.md
      - ng-api: cli/ng-api.md
      - data-service: cli/data-service.md

theme:
  name: material
  palette:
    scheme: default
    primary: deep purple
    accent: indigo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
